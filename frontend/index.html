<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pathfinder Pro — Delhi Route Engine</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,300;9..144,400&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  </head>

  <body>
    <div id="map"></div>

    <!-- ── COLLAPSE TOGGLE ── -->
    <button
      id="collapse-btn"
      onclick="togglePanel()"
      title="Toggle panel"
      aria-label="Toggle panel"
    >
      <svg
        id="collapse-icon"
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <polyline points="15 18 9 12 15 6" />
      </svg>
    </button>

    <aside id="panel">
      <!-- ── HEADER ── -->
      <header class="panel-header">
        <div class="brand">
          <div class="brand-mark">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path
                d="M13 3L4 14H11L11 21L20 10H13L13 3Z"
                fill="currentColor"
              />
            </svg>
          </div>
          <div class="brand-text">
            <span class="brand-name">Pathfinder Pro</span>
            <span class="brand-sub">Delhi Route Engine</span>
          </div>
        </div>
        <div class="header-controls">
          <div class="live-indicator" id="live-dot" title="Server connection">
            <span class="live-pip"></span>
          </div>
          <button
            class="theme-toggle"
            id="theme-btn"
            onclick="toggleTheme()"
            title="Toggle theme"
            aria-label="Toggle light/dark mode"
          >
            <span class="theme-icon" id="theme-icon">
              <!-- Moon (dark mode shown) -->
              <svg
                class="icon-moon"
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
              </svg>
              <svg
                class="icon-sun"
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="12" cy="12" r="5" />
                <line x1="12" y1="1" x2="12" y2="3" />
                <line x1="12" y1="21" x2="12" y2="23" />
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                <line x1="1" y1="12" x2="3" y2="12" />
                <line x1="21" y1="12" x2="23" y2="12" />
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
              </svg>
            </span>
          </button>
          <div class="algo-chip">
            <span class="algo-label" id="algo-label">A*</span>
          </div>
        </div>
      </header>

      <!-- ── PROGRESS ── -->
      <div
        class="progress-track"
        role="progressbar"
        aria-valuenow="0"
        aria-valuemin="0"
        aria-valuemax="100"
      >
        <div class="progress-fill" id="progress-fill"></div>
      </div>

      <!-- ── MODE SELECTOR ── -->
      <section class="section">
        <p class="section-label">Transport mode</p>
        <div class="mode-grid">
          <button
            class="mode-btn active"
            data-mode="drive"
            onclick="setMode('drive', this)"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M5 17H3v-5l2-5h14l2 5v5h-2M5 17a2 2 0 004 0M15 17a2 2 0 004 0"
              />
            </svg>
            <span>Drive</span>
          </button>
          <button
            class="mode-btn"
            data-mode="walk"
            onclick="setMode('walk', this)"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="13" cy="4" r="1.5" />
              <path d="M9 8l2 2 3-1 2 4-3 2v5M9 14l-2 4" />
            </svg>
            <span>Walk</span>
          </button>
          <button
            class="mode-btn"
            data-mode="cycle"
            onclick="setMode('cycle', this)"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="5.5" cy="17.5" r="3" />
              <circle cx="18.5" cy="17.5" r="3" />
              <path d="M15 6h-3l-2.5 7H5.5M15 6l3.5 5.5h-7" />
            </svg>
            <span>Cycle</span>
          </button>
        </div>
      </section>

      <!-- ── SEARCH ── -->
      <section class="section search-section">
        <p class="section-label">Search location</p>
        <div class="search-wrap">
          <svg
            class="search-icon"
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <circle cx="11" cy="11" r="8" />
            <path d="M21 21l-4.35-4.35" />
          </svg>
          <input
            type="text"
            id="search-input"
            class="search-input"
            placeholder="e.g. Connaught Place, AIIMS…"
            autocomplete="off"
            spellcheck="false"
            oninput="onSearchInput()"
            onkeydown="onSearchKey(event)"
          />
          <button
            class="search-clear"
            id="search-clear"
            onclick="clearSearch()"
            style="display: none"
            title="Clear"
          >
            <svg
              width="12"
              height="12"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
            >
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
          <div
            class="search-suggestions"
            id="search-suggestions"
            style="display: none"
          ></div>
        </div>

        <div class="action-row">
          <button class="action-btn geo" id="geo-btn" onclick="useMyLocation()">
            <svg
              width="12"
              height="12"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            >
              <circle cx="12" cy="12" r="3" />
              <path d="M12 2v3M12 19v3M2 12h3M19 12h3" />
            </svg>
            My location
          </button>
        </div>

        <div id="set-as-row" class="action-row" style="display: none">
          <button
            class="action-btn origin-btn"
            onclick="setSearchedPoint('origin')"
          >
            <svg width="10" height="10" viewBox="0 0 10 10">
              <circle cx="5" cy="5" r="4" fill="currentColor" />
            </svg>
            Set origin
          </button>
          <button
            class="action-btn dest-btn"
            onclick="setSearchedPoint('dest')"
          >
            <svg width="10" height="10" viewBox="0 0 10 10">
              <rect
                x="1"
                y="1"
                width="8"
                height="8"
                rx="2"
                fill="currentColor"
              />
            </svg>
            Set destination
          </button>
        </div>
      </section>

      <!-- ── WAYPOINTS ── -->
      <section class="waypoints">
        <div class="wp-track">
          <div class="wp-node origin-node"></div>
          <div class="wp-connector"></div>
          <div class="wp-node dest-node"></div>
        </div>
        <div class="wp-fields">
          <div class="wp-field" id="card-origin">
            <div class="wp-field-label origin-label">From</div>
            <div class="wp-field-value" id="hint-origin">
              Click map or search above
            </div>
            <div class="wp-field-coords" id="coords-origin"></div>
          </div>
          <div class="wp-field" id="card-dest">
            <div class="wp-field-label dest-label">To</div>
            <div class="wp-field-value" id="hint-dest">
              Click map or search above
            </div>
            <div class="wp-field-coords" id="coords-dest"></div>
          </div>
        </div>
      </section>

      <!-- ── METRICS ── -->
      <section class="metrics" id="metrics">
        <div class="metrics-grid">
          <div class="metric">
            <span class="metric-label">Distance</span>
            <div class="metric-val">
              <span id="dist">—</span><span class="metric-unit">km</span>
            </div>
          </div>
          <div class="metric">
            <span class="metric-label">ETA</span>
            <div class="metric-val">
              <span id="eta">—</span><span class="metric-unit">min</span>
            </div>
          </div>
          <div class="metric">
            <span class="metric-label">Compute</span>
            <div class="metric-val">
              <span id="exec">—</span><span class="metric-unit">ms</span>
            </div>
          </div>
        </div>
        <div class="nodes-row">
          <div class="nodes-info">
            <span class="metric-label">Nodes explored</span>
            <div class="nodes-val" id="nodes">—</div>
          </div>
          <div class="nodes-right">
            <svg
              width="32"
              height="32"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.2"
              class="nodes-glyph"
            >
              <circle cx="12" cy="12" r="2" />
              <circle cx="4" cy="5" r="1.5" />
              <circle cx="20" cy="5" r="1.5" />
              <circle cx="4" cy="19" r="1.5" />
              <circle cx="20" cy="19" r="1.5" />
              <line x1="5.1" y1="6.1" x2="10.9" y2="10.9" />
              <line x1="18.9" y1="6.1" x2="13.1" y2="10.9" />
              <line x1="5.1" y1="17.9" x2="10.9" y2="13.1" />
              <line x1="18.9" y1="17.9" x2="13.1" y2="13.1" />
            </svg>
            <span id="cache-badge" class="cache-badge" style="display: none"
              >cached</span
            >
          </div>
        </div>
      </section>

      <!-- ── DIRECTIONS ── -->
      <section class="directions" id="directions">
        <div class="directions-header">
          <span class="section-label" style="margin: 0">Turn-by-turn</span>
          <button
            class="dir-toggle"
            id="dir-toggle"
            onclick="toggleDirections()"
          >
            hide
          </button>
        </div>
        <div class="dir-list" id="directions-list"></div>
      </section>

      <!-- ── STATUS BAR ── -->
      <div class="status-bar" id="status-bar">
        <div class="status-dot" id="status-dot"></div>
        <span id="instruction-text">Click the map to set your origin</span>
      </div>

      <!-- ── RESET ── -->
      <button class="reset-btn" onclick="resetMap()">
        <svg
          width="13"
          height="13"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        >
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
          <path d="M3 3v5h5" />
        </svg>
        Reset navigation
      </button>
    </aside>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
  </body>
</html>
