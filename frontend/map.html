<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pathfinder Pro</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <!-- Socket.IO client — connects to Flask-SocketIO for live updates -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <style>
      /* ── RESET & TOKENS ─────────────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #060c18;
        --panel-bg: #0a1120;
        --panel-border: rgba(255, 255, 255, 0.06);
        --surface: #0f1a2e;
        --surface2: #131f33;
        --cyan: #22d3ee;
        --indigo: #818cf8;
        --green: #34d399;
        --amber: #fbbf24;
        --red: #f87171;
        --muted: #4a5a72;
        --text: #e2e8f0;
        --subtext: #64748b;
      }

      body {
        font-family: "Space Grotesk", sans-serif;
        background: var(--bg);
        color: var(--text);
        overflow: hidden;
        height: 100vh;
      }

      /* ── MAP ────────────────────────────────────────────────────────────── */
      #map {
        position: fixed;
        inset: 0;
        z-index: 0;
      }

      /* ── PANEL ──────────────────────────────────────────────────────────── */
      #panel {
        position: fixed;
        top: 24px;
        left: 24px;
        width: 340px;
        max-height: calc(100vh - 48px);
        overflow-y: auto;
        overflow-x: hidden;
        z-index: 1000;
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: 24px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        box-shadow:
          0 32px 80px rgba(0, 0, 0, 0.6),
          0 0 0 0.5px rgba(255, 255, 255, 0.04) inset;
        backdrop-filter: blur(24px);
        scrollbar-width: none;
      }
      #panel::-webkit-scrollbar {
        display: none;
      }

      /* ── HEADER ─────────────────────────────────────────────────────────── */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .logo-group {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .logo-icon {
        width: 38px;
        height: 38px;
        border-radius: 11px;
        background: #0e1f3d;
        border: 1px solid rgba(34, 211, 238, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .logo-title {
        font-size: 14px;
        font-weight: 600;
        color: #f1f5f9;
        letter-spacing: -0.01em;
      }
      .logo-sub {
        font-family: "JetBrains Mono", monospace;
        font-size: 9px;
        color: var(--cyan);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        margin-top: 1px;
      }
      .algo-badge {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        font-weight: 500;
        color: var(--cyan);
        background: rgba(34, 211, 238, 0.08);
        border: 1px solid rgba(34, 211, 238, 0.15);
        border-radius: 8px;
        padding: 4px 10px;
        letter-spacing: 0.05em;
      }

      /* ── PROGRESS BAR ───────────────────────────────────────────────────── */
      .progress-track {
        height: 2px;
        background: var(--surface);
        border-radius: 2px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--cyan), var(--indigo));
        border-radius: 2px;
        transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* ── TRANSPORT MODE SELECTOR ────────────────────────────────────────── */
      .mode-row {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 6px;
      }
      .mode-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 8px 6px;
        background: var(--surface);
        border: 1px solid var(--panel-border);
        border-radius: 10px;
        cursor: pointer;
        transition:
          border-color 0.2s,
          background 0.2s;
        color: var(--subtext);
        font-family: "JetBrains Mono", monospace;
        font-size: 9px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }
      .mode-btn svg {
        opacity: 0.5;
        transition: opacity 0.2s;
      }
      .mode-btn:hover {
        border-color: rgba(34, 211, 238, 0.3);
        color: var(--text);
      }
      .mode-btn:hover svg {
        opacity: 0.8;
      }
      .mode-btn.active {
        border-color: rgba(34, 211, 238, 0.5);
        background: rgba(34, 211, 238, 0.07);
        color: var(--cyan);
      }
      .mode-btn.active svg {
        opacity: 1;
      }

      /* ── SEARCH BAR ─────────────────────────────────────────────────────── */
      .search-section {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .search-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: var(--subtext);
        margin-bottom: 2px;
      }
      .search-input-wrap {
        position: relative;
      }
      .search-input {
        width: 100%;
        padding: 9px 36px 9px 12px;
        background: var(--surface);
        border: 1px solid var(--panel-border);
        border-radius: 10px;
        color: var(--text);
        font-family: "Space Grotesk", sans-serif;
        font-size: 12px;
        outline: none;
        transition: border-color 0.2s;
      }
      .search-input::placeholder {
        color: var(--subtext);
      }
      .search-input:focus {
        border-color: rgba(34, 211, 238, 0.4);
      }
      .search-btn-icon {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: var(--subtext);
        display: flex;
        align-items: center;
        padding: 2px;
        transition: color 0.2s;
      }
      .search-btn-icon:hover {
        color: var(--cyan);
      }

      /* Search suggestions dropdown */
      .search-suggestions {
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        right: 0;
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: 10px;
        z-index: 2000;
        overflow: hidden;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        max-height: 200px;
        overflow-y: auto;
      }
      .suggestion-item {
        padding: 9px 12px;
        font-size: 12px;
        color: var(--text);
        cursor: pointer;
        transition: background 0.15s;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      }
      .suggestion-item:last-child {
        border-bottom: none;
      }
      .suggestion-item:hover {
        background: var(--surface);
      }
      .suggestion-item .sug-name {
        font-weight: 500;
        margin-bottom: 2px;
      }
      .suggestion-item .sug-detail {
        font-size: 10px;
        color: var(--subtext);
      }

      /* Geolocation button */
      .geo-row {
        display: flex;
        gap: 6px;
      }
      .geo-btn {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 8px;
        background: var(--surface);
        border: 1px solid var(--panel-border);
        border-radius: 10px;
        color: var(--subtext);
        cursor: pointer;
        font-family: "Space Grotesk", sans-serif;
        font-size: 11px;
        font-weight: 500;
        transition:
          border-color 0.2s,
          color 0.2s;
      }
      .geo-btn:hover {
        border-color: rgba(52, 211, 153, 0.4);
        color: var(--green);
      }
      .geo-btn.loading {
        animation: geo-pulse 1s ease-in-out infinite;
      }
      @keyframes geo-pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      /* ── WAYPOINTS ──────────────────────────────────────────────────────── */
      .waypoints {
        display: flex;
        gap: 10px;
        align-items: stretch;
      }
      .wp-spine {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 14px;
        padding-bottom: 14px;
      }
      .wp-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .wp-dot.origin {
        background: var(--cyan);
      }
      .wp-dot.dest {
        background: var(--indigo);
      }
      .wp-line {
        flex: 1;
        width: 1px;
        background: var(--surface2);
        margin: 5px 0;
        min-height: 20px;
      }
      .wp-cards {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .wp-card {
        background: var(--surface);
        border-radius: 10px;
        padding: 9px 12px;
        transition: border-color 0.2s;
        cursor: default;
      }
      .wp-card.origin {
        border: 1px solid rgba(34, 211, 238, 0.15);
      }
      .wp-card.dest {
        border: 1px solid rgba(129, 140, 248, 0.15);
      }
      .wp-card.active.origin {
        border-color: rgba(34, 211, 238, 0.45);
      }
      .wp-card.active.dest {
        border-color: rgba(129, 140, 248, 0.45);
      }
      .wp-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        font-weight: 500;
        margin-bottom: 2px;
      }
      .wp-label.origin {
        color: var(--cyan);
      }
      .wp-label.dest {
        color: var(--indigo);
      }
      .wp-hint {
        font-size: 11px;
        color: var(--subtext);
      }
      .wp-coords {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        color: var(--text);
        display: none;
      }

      /* ── METRICS ────────────────────────────────────────────────────────── */
      .metrics {
        display: none;
        flex-direction: column;
        gap: 8px;
      }
      .metrics.show {
        display: flex;
      }
      .metric-row {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 6px;
      }
      .metric-card {
        background: var(--surface);
        border: 1px solid var(--panel-border);
        border-radius: 10px;
        padding: 10px 12px;
      }
      .metric-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 8px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--subtext);
        margin-bottom: 3px;
      }
      .metric-value {
        font-size: 16px;
        font-weight: 600;
        color: #f1f5f9;
      }
      .metric-unit {
        font-size: 10px;
        color: var(--subtext);
        font-weight: 400;
        margin-left: 1px;
      }

      .cache-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-family: "JetBrains Mono", monospace;
        font-size: 9px;
        color: var(--green);
        background: rgba(52, 211, 153, 0.08);
        border: 1px solid rgba(52, 211, 153, 0.2);
        border-radius: 6px;
        padding: 3px 7px;
      }

      /* ── DIRECTIONS PANEL ───────────────────────────────────────────────── */
      .directions {
        display: none;
        flex-direction: column;
        gap: 0;
      }
      .directions.show {
        display: flex;
      }
      .directions-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
      }
      .directions-title {
        font-family: "JetBrains Mono", monospace;
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: var(--cyan);
      }
      .directions-toggle {
        font-family: "JetBrains Mono", monospace;
        font-size: 9px;
        color: var(--subtext);
        background: none;
        border: none;
        cursor: pointer;
        letter-spacing: 0.05em;
        transition: color 0.2s;
      }
      .directions-toggle:hover {
        color: var(--cyan);
      }
      .directions-list {
        display: flex;
        flex-direction: column;
        gap: 0;
      }
      .dir-step {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        padding: 8px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      }
      .dir-step:last-child {
        border-bottom: none;
      }
      .dir-num {
        font-family: "JetBrains Mono", monospace;
        font-size: 9px;
        color: var(--cyan);
        background: rgba(34, 211, 238, 0.08);
        border-radius: 4px;
        padding: 2px 5px;
        flex-shrink: 0;
        margin-top: 1px;
        min-width: 22px;
        text-align: center;
      }
      .dir-text {
        font-size: 11px;
        color: var(--text);
        line-height: 1.4;
      }
      .dir-step.arrive .dir-num {
        color: var(--indigo);
        background: rgba(129, 140, 248, 0.08);
      }
      .dir-step.arrive .dir-text {
        color: var(--indigo);
        font-weight: 500;
      }

      /* ── NODES EXPLORED ─────────────────────────────────────────────────── */
      .nodes-card {
        background: var(--surface);
        border: 1px solid rgba(34, 211, 238, 0.1);
        border-radius: 10px;
        padding: 12px 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .nodes-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: var(--cyan);
        margin-bottom: 3px;
      }
      .nodes-value {
        font-size: 22px;
        font-weight: 600;
        color: #f1f5f9;
      }
      .nodes-icon {
        opacity: 0.25;
      }

      /* ── INSTRUCTION BAR ────────────────────────────────────────────────── */
      .instruction {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--surface);
        border: 1px solid var(--panel-border);
        border-radius: 10px;
        padding: 8px 12px;
      }
      .instruction-text {
        font-size: 11px;
        color: var(--subtext);
        line-height: 1.5;
      }

      /* ── RESET BUTTON ───────────────────────────────────────────────────── */
      .reset-btn {
        width: 100%;
        padding: 12px;
        background: rgba(34, 211, 238, 0.08);
        border: 1px solid rgba(34, 211, 238, 0.18);
        border-radius: 12px;
        color: var(--cyan);
        font-family: "Space Grotesk", sans-serif;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.03em;
        cursor: pointer;
        transition:
          background 0.15s,
          border-color 0.15s;
      }
      .reset-btn:hover {
        background: rgba(34, 211, 238, 0.14);
        border-color: rgba(34, 211, 238, 0.3);
      }
      .reset-btn:active {
        transform: scale(0.98);
      }

      /* ── LIVE STATUS DOT ────────────────────────────────────────────────── */
      .live-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--subtext);
        flex-shrink: 0;
        transition: background 0.3s;
      }
      .live-dot.connected {
        background: var(--green);
        animation: pulse-dot 2s ease-in-out infinite;
      }
      @keyframes pulse-dot {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      /* ── LEAFLET OVERRIDES ──────────────────────────────────────────────── */
      .leaflet-bar a {
        background: var(--panel-bg) !important;
        color: var(--cyan) !important;
        border: 1px solid var(--panel-border) !important;
      }
      .leaflet-bar a:hover {
        background: var(--surface) !important;
      }
      .leaflet-control-attribution {
        display: none !important;
      }
    </style>
  </head>

  <body>
    <div id="map"></div>

    <aside id="panel">
      <!-- ── HEADER ─────────────────────────────────────────────────────── -->
      <div class="header">
        <div class="logo-group">
          <div class="logo-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path
                d="M13 3L4 14H11L11 21L20 10H13L13 3Z"
                fill="#22d3ee"
                stroke="#22d3ee"
                stroke-width="0.5"
                stroke-linejoin="round"
              />
            </svg>
          </div>
          <div>
            <div class="logo-title">Pathfinder Pro</div>
            <div class="logo-sub">Delhi Route Engine</div>
          </div>
        </div>
        <div style="display: flex; align-items: center; gap: 8px">
          <div
            class="live-dot"
            id="live-dot"
            title="Live connection status"
          ></div>
          <div class="algo-badge">A*</div>
        </div>
      </div>

      <!-- ── PROGRESS ───────────────────────────────────────────────────── -->
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>

      <!-- ── TRANSPORT MODE ─────────────────────────────────────────────── -->
      <!--
        WHY: Different modes use different edge weights and speed models.
        Drive → travel_time weight (uses real speed limits from OSMnx)
        Walk  → length weight (shortest distance, 5 km/h)
        Cycle → length weight (shortest distance, 20 km/h)
        The selected mode is sent with every /find_path request.
      -->
      <div>
        <div class="search-label" style="margin-bottom: 6px">
          Transport mode
        </div>
        <div class="mode-row">
          <button
            class="mode-btn active"
            data-mode="drive"
            onclick="setMode('drive', this)"
          >
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path
                d="M5 17H3v-5l2-5h14l2 5v5h-2M5 17a2 2 0 004 0M15 17a2 2 0 004 0"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            Drive
          </button>
          <button
            class="mode-btn"
            data-mode="walk"
            onclick="setMode('walk', this)"
          >
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <circle cx="13" cy="4" r="1.5" />
              <path
                d="M9 8l2 2 3-1 2 4-3 2v5M9 14l-2 4"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            Walk
          </button>
          <button
            class="mode-btn"
            data-mode="cycle"
            onclick="setMode('cycle', this)"
          >
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <circle cx="5.5" cy="17.5" r="3" />
              <circle cx="18.5" cy="17.5" r="3" />
              <path
                d="M15 6h-3l-2.5 7H5.5M15 6l3.5 5.5h-7"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            Cycle
          </button>
        </div>
      </div>

      <!-- ── SEARCH ──────────────────────────────────────────────────────── -->
      <!--
        WHY: Click-only input is not how real apps work.
        We use Nominatim (free OpenStreetMap geocoder) — no API key needed.
        User can search for origin OR destination — buttons below clarify intent.
        Results appear as a dropdown, clicking one places the point.
      -->
      <div class="search-section">
        <div class="search-label">Search location</div>
        <div class="search-input-wrap">
          <input
            type="text"
            id="search-input"
            class="search-input"
            placeholder="Search Delhi — e.g. Connaught Place"
            autocomplete="off"
            oninput="onSearchInput()"
            onkeydown="onSearchKey(event)"
          />
          <button class="search-btn-icon" onclick="doSearch()" title="Search">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="11" cy="11" r="8" />
              <path d="M21 21l-4.35-4.35" stroke-linecap="round" />
            </svg>
          </button>
          <div
            class="search-suggestions"
            id="search-suggestions"
            style="display: none"
          ></div>
        </div>

        <!-- Geolocation + set-as buttons -->
        <div class="geo-row">
          <button class="geo-btn" id="geo-btn" onclick="useMyLocation()">
            <svg
              width="13"
              height="13"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="3" />
              <path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke-linecap="round" />
            </svg>
            Use my location
          </button>
        </div>

        <!-- Set-as: origin or destination -->
        <div id="set-as-row" style="display: none; gap: 6px" class="geo-row">
          <button
            class="geo-btn"
            style="border-color: rgba(34, 211, 238, 0.3); color: var(--cyan)"
            onclick="setSearchedPoint('origin')"
          >
            Set as origin
          </button>
          <button
            class="geo-btn"
            style="border-color: rgba(129, 140, 248, 0.3); color: var(--indigo)"
            onclick="setSearchedPoint('dest')"
          >
            Set as destination
          </button>
        </div>
      </div>

      <!-- ── WAYPOINTS ──────────────────────────────────────────────────── -->
      <div class="waypoints">
        <div class="wp-spine">
          <div class="wp-dot origin"></div>
          <div class="wp-line"></div>
          <div class="wp-dot dest"></div>
        </div>
        <div class="wp-cards">
          <div class="wp-card origin" id="card-origin">
            <div class="wp-label origin">Origin</div>
            <div class="wp-hint" id="hint-origin">Click map or search</div>
            <div class="wp-coords" id="coords-origin"></div>
          </div>
          <div class="wp-card dest" id="card-dest">
            <div class="wp-label dest">Destination</div>
            <div class="wp-hint" id="hint-dest">Click map or search</div>
            <div class="wp-coords" id="coords-dest"></div>
          </div>
        </div>
      </div>

      <!-- ── METRICS ────────────────────────────────────────────────────── -->
      <div class="metrics" id="metrics">
        <div class="metric-row">
          <div class="metric-card">
            <div class="metric-label">Distance</div>
            <div class="metric-value">
              <span id="dist">0</span><span class="metric-unit">km</span>
            </div>
          </div>
          <div class="metric-card">
            <div class="metric-label">ETA</div>
            <div class="metric-value">
              <span id="eta">0</span><span class="metric-unit">min</span>
            </div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Algo time</div>
            <div class="metric-value">
              <span id="exec">0</span><span class="metric-unit">ms</span>
            </div>
          </div>
        </div>
        <div class="nodes-card">
          <div>
            <div class="nodes-label">Nodes Explored</div>
            <div class="nodes-value" id="nodes">—</div>
          </div>
          <div
            style="
              display: flex;
              flex-direction: column;
              align-items: flex-end;
              gap: 6px;
            "
          >
            <svg
              class="nodes-icon"
              width="28"
              height="28"
              viewBox="0 0 24 24"
              fill="none"
              stroke="#22d3ee"
              stroke-width="1.4"
            >
              <circle cx="12" cy="12" r="2.5" />
              <circle cx="4" cy="5" r="1.8" />
              <circle cx="20" cy="5" r="1.8" />
              <circle cx="4" cy="19" r="1.8" />
              <circle cx="20" cy="19" r="1.8" />
              <line x1="5.2" y1="6.2" x2="10.8" y2="10.8" />
              <line x1="18.8" y1="6.2" x2="13.2" y2="10.8" />
              <line x1="5.2" y1="17.8" x2="10.8" y2="13.2" />
              <line x1="18.8" y1="17.8" x2="13.2" y2="13.2" />
            </svg>
            <div id="cache-badge" style="display: none" class="cache-badge">
              <svg width="8" height="8" viewBox="0 0 8 8" fill="var(--green)">
                <circle cx="4" cy="4" r="4" />
              </svg>
              cached
            </div>
          </div>
        </div>
      </div>

      <!-- ── TURN-BY-TURN DIRECTIONS ────────────────────────────────────── -->
      <!--
        WHY: A real nav app tells you where to turn. We extract road names
        from the OSM edge attributes on the backend and send them as a
        structured list. Here we render them as a step-by-step panel.
      -->
      <div class="directions" id="directions">
        <div class="directions-header">
          <span class="directions-title">Turn-by-turn</span>
          <button
            class="directions-toggle"
            id="dir-toggle"
            onclick="toggleDirections()"
          >
            hide
          </button>
        </div>
        <div class="directions-list" id="directions-list"></div>
      </div>

      <!-- ── INSTRUCTION ────────────────────────────────────────────────── -->
      <div class="instruction" id="instruction-row">
        <svg
          width="13"
          height="13"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#4a5a72"
          stroke-width="2"
        >
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="8" x2="12" y2="12" />
          <circle cx="12" cy="16" r="0.5" fill="#4a5a72" />
        </svg>
        <span class="instruction-text" id="instruction-text"
          >Click the map to set your origin point</span
        >
      </div>

      <!-- ── RESET ──────────────────────────────────────────────────────── -->
      <button class="reset-btn" onclick="resetMap()">Reset Navigation</button>
    </aside>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
      // ────────────────────────────────────────────────────────────────────────
      // CONFIGURATION
      // ────────────────────────────────────────────────────────────────────────

      // WHY: Dynamic API base means the same HTML file works locally AND deployed.
      // On localhost → talks to Flask at port 5000
      // On any other host → uses same-origin (works on Render, Railway, etc.)
      const API_BASE =
        window.location.hostname === "localhost" ||
        window.location.hostname === "127.0.0.1"
          ? "http://127.0.0.1:5000"
          : "";

      // Nominatim: free OSM geocoder, no API key required.
      // We add email param as courtesy to OSM — required by their usage policy.
      const NOMINATIM_BASE = "https://nominatim.openstreetmap.org";
      const NOMINATIM_EMAIL = "sushantduggal24@gmail.com"; // change to yours

      // ────────────────────────────────────────────────────────────────────────
      // STATE
      // ────────────────────────────────────────────────────────────────────────
      let clickPoints = []; // [[lat,lng], [lat,lng]] — origin and dest
      let markers = []; // Leaflet marker objects on the map
      let pathLayers = []; // Leaflet polyline objects for the route
      let currentMode = "drive"; // selected transport mode
      let searchedLatLng = null; // result from Nominatim search or geolocation
      let searchTimeout = null; // debounce timer for search input
      let directionsOpen = true; // toggle state for directions panel

      // ────────────────────────────────────────────────────────────────────────
      // MAP SETUP
      // ────────────────────────────────────────────────────────────────────────
      const map = L.map("map", {
        zoomControl: false,
        attributionControl: false,
      }).setView([28.6139, 77.209], 12);

      L.tileLayer(
        "https://tiles.stadiamaps.com/tiles/alidade_smooth_dark/{z}/{x}/{y}{r}.png",
        { maxZoom: 20 },
      ).addTo(map);

      L.control.zoom({ position: "bottomright" }).addTo(map);

      // ────────────────────────────────────────────────────────────────────────
      // WEBSOCKET — Foundation for live condition updates (waterlogging, markets)
      // WHY: When we add real-time data, the server will push condition changes
      // here without the user refreshing. For now it just shows the connection.
      // ────────────────────────────────────────────────────────────────────────
      let socket = null;

      function initWebSocket() {
        try {
          socket = io(API_BASE, { transports: ["websocket", "polling"] });

          socket.on("connect", () => {
            document.getElementById("live-dot").classList.add("connected");
            // Subscribe to live condition updates for the Delhi area
            socket.emit("subscribe_conditions", { city: "delhi" });
          });

          socket.on("disconnect", () => {
            document.getElementById("live-dot").classList.remove("connected");
          });

          socket.on("status", (data) => {
            console.log("Server:", data.message);
          });

          // Future: server will push waterlogging/market alerts here
          socket.on("condition_update", (data) => {
            console.log("Condition update received:", data);
            // TODO: update edge overlay on map when waterlogging system is added
          });
        } catch (e) {
          console.log("WebSocket not available — offline mode");
        }
      }

      initWebSocket();

      // ────────────────────────────────────────────────────────────────────────
      // TRANSPORT MODE
      // ────────────────────────────────────────────────────────────────────────
      function setMode(mode, btn) {
        currentMode = mode;
        document
          .querySelectorAll(".mode-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        // If both points are set, recompute the route with the new mode
        if (clickPoints.length === 2) {
          computeRoute();
        }
      }

      // ────────────────────────────────────────────────────────────────────────
      // NOMINATIM SEARCH
      // WHY: Users type place names, not lat/lon. Nominatim converts text to
      // coordinates for free. We debounce the input to avoid hammering the API
      // on every keystroke — waits 400ms after the user stops typing.
      // ────────────────────────────────────────────────────────────────────────
      function onSearchInput() {
        clearTimeout(searchTimeout);
        const query = document.getElementById("search-input").value.trim();
        if (query.length < 3) {
          hideSuggestions();
          return;
        }
        searchTimeout = setTimeout(() => fetchSuggestions(query), 400);
      }

      function onSearchKey(e) {
        if (e.key === "Enter") doSearch();
        if (e.key === "Escape") hideSuggestions();
      }

      async function fetchSuggestions(query) {
        try {
          // Bias results to Delhi bounding box so "Nehru Place" returns Delhi, not elsewhere
          const url =
            `${NOMINATIM_BASE}/search?q=${encodeURIComponent(query + ", Delhi")}` +
            `&format=json&limit=5&email=${NOMINATIM_EMAIL}` +
            `&viewbox=76.8,28.4,77.4,28.9&bounded=1`;

          const res = await fetch(url, {
            headers: { "Accept-Language": "en" },
          });
          const data = await res.json();
          showSuggestions(data);
        } catch (err) {
          console.error("Nominatim error:", err);
        }
      }

      function showSuggestions(results) {
        const box = document.getElementById("search-suggestions");
        if (!results.length) {
          hideSuggestions();
          return;
        }

        box.innerHTML = results
          .map(
            (r) => `
        <div class="suggestion-item"
          onclick="selectSuggestion(${r.lat}, ${r.lon}, '${escapeAttr(r.display_name)}')">
          <div class="sug-name">${r.display_name.split(",")[0]}</div>
          <div class="sug-detail">${r.display_name.split(",").slice(1, 3).join(",").trim()}</div>
        </div>
      `,
          )
          .join("");

        box.style.display = "block";
      }

      function hideSuggestions() {
        document.getElementById("search-suggestions").style.display = "none";
      }

      function escapeAttr(str) {
        return str.replace(/'/g, "\\'").replace(/"/g, "&quot;");
      }

      function selectSuggestion(lat, lon, name) {
        searchedLatLng = [parseFloat(lat), parseFloat(lon)];
        document.getElementById("search-input").value = name.split(",")[0];
        hideSuggestions();
        // Show the "set as origin / destination" buttons
        document.getElementById("set-as-row").style.display = "flex";
        // Pan map to the searched location
        map.setView(searchedLatLng, 15);
      }

      async function doSearch() {
        const query = document.getElementById("search-input").value.trim();
        if (!query) return;
        await fetchSuggestions(query);
      }

      // WHY: User may want to set searched location as origin OR destination.
      // We don't assume — we ask them explicitly with two buttons.
      function setSearchedPoint(type) {
        if (!searchedLatLng) return;
        const [lat, lng] = searchedLatLng;

        // Place it as if the user clicked the map at that point
        placePoint(lat, lng, type);

        // Clean up search UI
        document.getElementById("set-as-row").style.display = "none";
        document.getElementById("search-input").value = "";
        searchedLatLng = null;

        // If both points are now set, compute route
        if (clickPoints.length === 2) computeRoute();
      }

      // ────────────────────────────────────────────────────────────────────────
      // GEOLOCATION
      // WHY: "Use my location" is the most-used feature in any nav app.
      // navigator.geolocation is built into every browser, no library needed.
      // We show a loading state while the GPS resolves.
      // ────────────────────────────────────────────────────────────────────────
      function useMyLocation() {
        if (!navigator.geolocation) {
          setInstruction("Geolocation not supported by your browser");
          return;
        }

        const btn = document.getElementById("geo-btn");
        btn.classList.add("loading");
        btn.textContent = "Locating…";

        navigator.geolocation.getCurrentPosition(
          (pos) => {
            btn.classList.remove("loading");
            btn.innerHTML = `
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke-linecap="round"/>
            </svg>
            Use my location`;

            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;

            // Store as searched point so user can assign it to origin or dest
            searchedLatLng = [lat, lng];
            document.getElementById("set-as-row").style.display = "flex";
            map.setView([lat, lng], 15);

            // Add a pulsing blue dot for current location
            const geoIcon = L.divIcon({
              className: "",
              iconAnchor: [10, 10],
              html: `<div style="
              width:20px;height:20px;border-radius:50%;
              background:rgba(52,211,153,0.3);
              border:2px solid #34d399;
              animation:pulse-dot 2s ease-in-out infinite;
            "></div>`,
            });
            L.marker([lat, lng], { icon: geoIcon }).addTo(map);
          },
          (err) => {
            btn.classList.remove("loading");
            btn.innerHTML = `
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke-linecap="round"/>
            </svg>
            Use my location`;
            setInstruction(
              "Location access denied — check browser permissions",
            );
          },
          { timeout: 8000, maximumAge: 60000 },
        );
      }

      // ────────────────────────────────────────────────────────────────────────
      // MARKERS & ROUTE DRAWING
      // ────────────────────────────────────────────────────────────────────────
      function makeMarker(lat, lng, type) {
        const isOrigin = type === "origin";
        const color = isOrigin ? "#22d3ee" : "#818cf8";
        const outer = isOrigin
          ? "rgba(34,211,238,0.18)"
          : "rgba(129,140,248,0.18)";
        const icon = L.divIcon({
          className: "",
          iconAnchor: [18, 18],
          html: `<svg width="36" height="36" viewBox="0 0 36 36">
          <circle cx="18" cy="18" r="16" fill="${outer}" stroke="${color}" stroke-width="1"/>
          <circle cx="18" cy="18" r="6"  fill="${color}"/>
          <circle cx="18" cy="18" r="3"  fill="#060c18"/>
        </svg>`,
        });
        return L.marker([lat, lng], { icon }).addTo(map);
      }

      function drawRoute(coords, mode) {
        // Route color varies by mode — visual clarity at a glance
        const colors = { drive: "#22d3ee", walk: "#34d399", cycle: "#fbbf24" };
        const color = colors[mode] || "#22d3ee";

        const halo = L.polyline(coords, {
          color,
          weight: 20,
          opacity: 0.04,
          lineCap: "round",
          lineJoin: "round",
        }).addTo(map);
        const glow = L.polyline(coords, {
          color,
          weight: 8,
          opacity: 0.12,
          lineCap: "round",
          lineJoin: "round",
        }).addTo(map);
        const line = L.polyline(coords, {
          color,
          weight: 2.5,
          opacity: 1,
          lineCap: "round",
          lineJoin: "round",
        }).addTo(map);
        const dash = L.polyline(coords, {
          color: "#ffffff",
          weight: 1,
          opacity: 0.12,
          dashArray: "6 10",
          lineCap: "round",
        }).addTo(map);

        pathLayers.push(halo, glow, line, dash);
        return line;
      }

      // ────────────────────────────────────────────────────────────────────────
      // PLACE POINT  — shared logic used by click, search, and geolocation
      // ────────────────────────────────────────────────────────────────────────
      function placePoint(lat, lng, type) {
        // type can be 'origin' or 'dest' — or 'auto' meaning next available slot
        if (type === "auto") {
          type = clickPoints.length === 0 ? "origin" : "dest";
        }

        if (type === "origin") {
          // Replace existing origin if already set
          if (clickPoints[0]) {
            if (markers[0]) map.removeLayer(markers[0]);
            clickPoints[0] = [lat, lng];
            markers[0] = makeMarker(lat, lng, "origin");
          } else {
            clickPoints.push([lat, lng]);
            markers.push(makeMarker(lat, lng, "origin"));
          }
          updateCoords("origin", lat, lng);
          setProgress(40);
          if (clickPoints.length < 2)
            setInstruction("Now set your destination");
        } else {
          // dest
          if (clickPoints.length === 0) {
            // Need origin first
            setInstruction("Please set your origin first");
            return;
          }
          if (clickPoints[1] !== undefined) {
            if (markers[1]) map.removeLayer(markers[1]);
            clickPoints[1] = [lat, lng];
            markers[1] = makeMarker(lat, lng, "dest");
          } else {
            clickPoints.push([lat, lng]);
            markers.push(makeMarker(lat, lng, "dest"));
          }
          updateCoords("dest", lat, lng);
          setProgress(70);
          computeRoute();
        }
      }

      // ────────────────────────────────────────────────────────────────────────
      // ROUTE COMPUTATION
      // ────────────────────────────────────────────────────────────────────────
      function computeRoute() {
        if (clickPoints.length < 2) return;

        // Clear old route lines (not markers)
        pathLayers.forEach((l) => map.removeLayer(l));
        pathLayers = [];

        setProgress(70);
        setInstruction("Calculating route…");

        fetch(`${API_BASE}/find_path`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            start: clickPoints[0],
            end: clickPoints[1],
            mode: currentMode, // WHY: tells backend which speed model to use
          }),
        })
          .then((r) => r.json())
          .then((data) => {
            if (data.error) {
              setInstruction(`Error: ${data.error}`);
              setProgress(0);
              return;
            }

            // Draw route — color matches mode
            const line = drawRoute(data.path, data.mode);
            map.fitBounds(line.getBounds(), { padding: [80, 80] });

            // Update metrics
            document.getElementById("dist").textContent = data.distance;
            document.getElementById("eta").textContent = data.time;
            document.getElementById("exec").textContent = data.execution_time;
            document.getElementById("nodes").textContent =
              data.nodes_visited.toLocaleString();
            document.getElementById("metrics").classList.add("show");

            // Cache badge — show if result came from cache
            const cacheBadge = document.getElementById("cache-badge");
            cacheBadge.style.display = data.cache_hit ? "inline-flex" : "none";

            // Render turn-by-turn directions
            renderDirections(data.directions || []);

            setProgress(100);
            setInstruction(
              `Route found (${data.mode_label}) — click map to start over`,
            );
          })
          .catch(() => {
            setInstruction("Could not reach server. Is Flask running?");
            setProgress(0);
          });
      }

      // ────────────────────────────────────────────────────────────────────────
      // DIRECTIONS PANEL
      // WHY: Turn-by-turn instructions extracted from OSM road names on the
      // backend. We render them as a numbered list with the last step styled
      // as the arrival step.
      // ────────────────────────────────────────────────────────────────────────
      function renderDirections(directions) {
        const list = document.getElementById("directions-list");
        const panel = document.getElementById("directions");

        if (!directions.length) {
          panel.classList.remove("show");
          return;
        }

        list.innerHTML = directions
          .map((d, i) => {
            const isArrival = i === directions.length - 1;
            return `<div class="dir-step ${isArrival ? "arrive" : ""}">
          <span class="dir-num">${d.step}</span>
          <span class="dir-text">${d.instruction}</span>
        </div>`;
          })
          .join("");

        panel.classList.add("show");
      }

      function toggleDirections() {
        directionsOpen = !directionsOpen;
        const list = document.getElementById("directions-list");
        const toggle = document.getElementById("dir-toggle");
        list.style.display = directionsOpen ? "flex" : "none";
        toggle.textContent = directionsOpen ? "hide" : "show";
      }

      // ────────────────────────────────────────────────────────────────────────
      // UI HELPERS
      // ────────────────────────────────────────────────────────────────────────
      function setProgress(pct) {
        document.getElementById("progress-fill").style.width = pct + "%";
      }

      function setInstruction(text) {
        document.getElementById("instruction-text").textContent = text;
      }

      function updateCoords(type, lat, lng) {
        document.getElementById(`hint-${type}`).style.display = "none";
        document.getElementById(`coords-${type}`).style.display = "block";
        document.getElementById(`coords-${type}`).textContent =
          `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
        document.getElementById(`card-${type}`).classList.add("active");
      }

      // ────────────────────────────────────────────────────────────────────────
      // RESET
      // ────────────────────────────────────────────────────────────────────────
      function resetMap() {
        clickPoints = [];
        markers.forEach((m) => map.removeLayer(m));
        markers = [];
        pathLayers.forEach((l) => map.removeLayer(l));
        pathLayers = [];

        ["origin", "dest"].forEach((t) => {
          document.getElementById(`hint-${t}`).style.display = "block";
          document.getElementById(`coords-${t}`).style.display = "none";
          document.getElementById(`card-${t}`).classList.remove("active");
        });

        document.getElementById("metrics").classList.remove("show");
        document.getElementById("directions").classList.remove("show");
        document.getElementById("directions-list").innerHTML = "";
        document.getElementById("cache-badge").style.display = "none";
        document.getElementById("set-as-row").style.display = "none";
        document.getElementById("search-input").value = "";
        searchedLatLng = null;

        setProgress(0);
        setInstruction("Click the map to set your origin point");
      }

      // ────────────────────────────────────────────────────────────────────────
      // MAP CLICK — original click-to-place still works alongside search
      // ────────────────────────────────────────────────────────────────────────
      map.on("click", function (e) {
        // Close search dropdown if open
        hideSuggestions();

        const { lat, lng } = e.latlng;

        if (clickPoints.length >= 2) {
          // Both points already set — reset and start fresh with origin
          resetMap();
          placePoint(lat, lng, "origin");
          return;
        }

        placePoint(lat, lng, "auto");
      });
    </script>
  </body>
</html>
